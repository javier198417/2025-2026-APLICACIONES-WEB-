{% extends "base.html" %}

{% block title %}Eliminar Producto{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Eliminar Producto</h1>
    <p>¿Estás seguro de que deseas eliminar el producto <strong>{{ producto.nombre }}</strong>? Esta acción no se puede deshacer.</p>
    <form method="post" action="{{ url_for('eliminar_producto_mysql', id=producto.id_producto) }}">
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{{ url_for('listar_productos_mysql') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
