{% extends "base.html" %}
{% block content %}
<h1>Gestión de Categorías</h1>
<a href="/categoria/nueva" class="btn btn-primary">➕ Nueva Categoría</a>
<hr>
<ul class="list-group">
    {% for cat in categorias %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ cat.nombre_categoria }}
        <span class="badge bg-primary rounded-pill">{{ cat.productos|length }} productos</span>
    </li>
    {% endfor %}
</ul>
<br>
<a href="/productos" class="btn btn-secondary">Volver a Productos</a>
{% endblock %}
